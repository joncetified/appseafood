<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seafood Offline</title>
    <meta name="theme-color" content="#0f172a">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #0f172a, #082f49);
            color: #fff;
        }
        .card {
            max-width: 420px;
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 24px;
            padding: 28px;
            background: rgba(255,255,255,.08);
            backdrop-filter: blur(12px);
            text-align: center;
        }
        h1 { margin: 0 0 12px; font-size: 32px; }
        p { margin: 0; line-height: 1.7; color: rgba(255,255,255,.82); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Seafood</h1>
        <p>Koneksi internet sedang tidak tersedia. Coba lagi setelah jaringan kembali aktif.</p>
    </div>
</body>
</html>
